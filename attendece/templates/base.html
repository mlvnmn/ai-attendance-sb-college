<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Attendance</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <!-- SocketIO -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4F46E5',
                        secondary: '#10B981',
                        dark: '#1F2937',
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-gray-100 min-h-screen text-gray-800 font-sans">
    <nav class="bg-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between items-center py-4">
                <div class="flex items-center">
                    <a href="/" class="text-2xl font-bold text-primary">AttendanceSystem</a>
                </div>
                <div class="flex space-x-4">
                    <a href="/class" class="py-2 px-4 text-gray-700 hover:text-primary transition font-medium">Class
                        Mode</a>
                    <button onclick="openLoginModal()"
                        class="py-2 px-4 bg-primary text-white rounded-lg hover:bg-opacity-90 transition shadow-lg">Teacher
                        Dashboard</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-8">
        {% block content %}{% endblock %}
    </main>

    <!-- Login Modal -->
    <div id="loginModal"
        class="hidden fixed inset-0 bg-gray-600 bg-opacity-70 overflow-y-auto h-full w-full flex items-center justify-center z-50 backdrop-blur-sm">
        <div class="bg-white p-8 rounded-xl shadow-2xl w-full max-w-sm mx-4 transform transition-all scale-100">
            <div class="text-center mb-6">
                <div class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-indigo-100 mb-4">
                    <svg class="h-6 w-6 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z">
                        </path>
                    </svg>
                </div>
                <h3 class="text-2xl font-bold text-gray-900">Security Check</h3>
                <p class="text-sm text-gray-500 mt-2">Please enter the teacher password.</p>
            </div>

            <form onsubmit="handleLogin(event)">
                <div class="mb-6">
                    <input type="password" id="passwordInput" placeholder="••••••••"
                        class="w-full px-4 py-3 rounded-lg border focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition text-center text-lg tracking-widest"
                        autofocus>
                    <p id="loginError" class="text-red-500 text-xs mt-2 hidden text-center">Incorrect password</p>
                </div>
                <div class="flex gap-3">
                    <button type="button" onclick="closeLoginModal()"
                        class="flex-1 px-4 py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 font-medium">Cancel</button>
                    <button type="submit"
                        class="flex-1 px-4 py-2 bg-primary text-white rounded-lg hover:bg-indigo-700 font-bold shadow-md">Unlock</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function openLoginModal() {
            document.getElementById('loginModal').classList.remove('hidden');
            setTimeout(() => document.getElementById('passwordInput').focus(), 100);
        }

        function closeLoginModal() {
            document.getElementById('loginModal').classList.add('hidden');
            document.getElementById('loginError').classList.add('hidden');
            document.getElementById('passwordInput').value = '';
        }

        async function handleLogin(e) {
            e.preventDefault();
            const password = document.getElementById('passwordInput').value;
            const errorElem = document.getElementById('loginError');

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });

                const data = await res.json();

                if (data.success) {
                    window.location.href = '/teacher';
                } else {
                    errorElem.innerText = data.error || 'Incorrect password';
                    errorElem.classList.remove('hidden');
                    document.getElementById('passwordInput').classList.add('border-red-500');
                }
            } catch (err) {
                console.error(err);
                errorElem.innerText = 'Connection error';
                errorElem.classList.remove('hidden');
            }
        }

        // Check for ?login=true param
        if (new URLSearchParams(window.location.search).get('login')) {
            openLoginModal();
            // Clean URL
            window.history.replaceState({}, document.title, "/");
        }
    </script>

    <footer class="text-center py-4 text-gray-500 text-sm">
        &copy; 2026 Smart Attendance System
    </footer>
</body>

</html>
