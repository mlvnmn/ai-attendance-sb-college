{% extends "base.html" %}

{% block content %}
<div class="flex flex-col lg:flex-row gap-6 h-full">
    <!-- Camera Section -->
    <div class="lg:w-2/3 space-y-4">
        <div class="bg-white p-4 rounded-xl shadow-lg relative overflow-hidden">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold text-gray-700">Live Camera Feed</h2>
                <button onclick="resetSession()"
                    class="text-xs font-bold bg-gray-100 hover:bg-red-100 text-gray-500 hover:text-red-600 px-3 py-1.5 rounded-lg border border-gray-200 transition-colors flex items-center gap-2">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16">
                        </path>
                    </svg>
                    Reset Session
                </button>
            </div>
            <div class="relative w-full aspect-video bg-black rounded-lg overflow-hidden border-4 border-gray-100">
                <video id="videoElement" autoplay playsinline
                    class="w-full h-full object-cover transform scale-x-[-1]"></video>
                <div
                    class="absolute top-4 right-4 bg-black bg-opacity-60 text-white px-3 py-1 rounded-full text-sm backdrop-blur-md">
                    <span id="connectionStatus" class="flex items-center gap-2">
                        <span class="w-2 h-2 rounded-full bg-red-500"></span> Disconnected
                    </span>
                </div>

                <!-- Overlay for "In Frame" students -->
                <div id="inFrameOverlay"
                    class="absolute bottom-4 left-4 right-4 flex flex-wrap gap-2 pointer-events-none">
                    <!-- Badges will appear here -->
                </div>
            </div>
            <p class="text-sm text-gray-500 mt-2 italic">Tip: Face the camera directly for instant recognition.</p>
        </div>
    </div>

    <!-- Attendance List Section -->
    <div class="lg:w-1/3 space-y-4">
        <div class="bg-white p-6 rounded-xl shadow-lg h-full flex flex-col min-h-[500px]">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h2 class="text-xl font-bold text-gray-700">Marked Present</h2>
                    <p class="text-sm text-gray-500">Current Session</p>
                </div>
                <div class="bg-indigo-600 text-white px-4 py-1.5 rounded-full text-sm font-bold shadow-lg">
                    <span id="studentCount">0</span> Enrolled
                </div>
            </div>

            <div class="flex-grow overflow-y-auto space-y-3 pr-2 custom-scrollbar" id="markedList">
                <div class="text-center text-gray-400 py-12 border-2 border-dashed border-gray-100 rounded-xl">
                    <svg class="w-12 h-12 mx-auto mb-3 text-gray-300" fill="none" stroke="currentColor"
                        viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 4.318l-1.318 1.318M12 4.318l1.318 1.318M12 4.318V21m0 0l-3.318-3.318M12 21l3.318-3.318">
                        </path>
                    </svg>
                    Waiting for face scans...
                </div>
            </div>

            <div class="mt-8 pt-4 border-t space-y-3">
                <div
                    class="flex items-center justify-between text-sm mb-4 bg-gray-50 p-3 rounded-lg border border-gray-100">
                    <span class="text-gray-600">Headcount (Live):</span>
                    <span id="headCount" class="font-bold text-indigo-600 text-lg">0</span>
                </div>

                <div id="verificationResult" class="hidden p-3 rounded-lg text-sm font-bold text-center mb-2"></div>

                <button onclick="verifyHeadcount()" id="verifyBtn"
                    class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-6 rounded-lg shadow-md transition transform hover:active:scale-95 flex items-center justify-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4">
                        </path>
                    </svg>
                    1. Verify Headcount
                </button>

                <button onclick="commitAttendance()" id="commitBtn"
                    class="w-full bg-secondary hover:bg-emerald-600 text-white font-bold py-3 px-6 rounded-lg shadow-md transition transform hover:active:scale-95 opacity-50 cursor-not-allowed flex items-center justify-center gap-2"
                    disabled>
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
                    </svg>
                    2. Commit Attendance
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    const socket = io();
    const video = document.getElementById('videoElement');
    const connectionStatus = document.getElementById('connectionStatus');
    const markedList = document.getElementById('markedList');
    const inFrameOverlay = document.getElementById('inFrameOverlay');
    const studentCountElem = document.getElementById('studentCount');
    const headCountElem = document.getElementById('headCount');
    const verificationResult = document.getElementById('verificationResult');
    const commitBtn = document.getElementById('commitBtn');

    // State
    let currentHeadCount = 0;
    let markedStudentCount = 0;

    // Canvas for capturing frames
    const canvas = document.createElement('canvas');
    const context = canvas.getContext('2d');

    // Camera Access
    if (navigator.mediaDevices.getUserMedia) {
        navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } })
            .then(function (stream) {
                video.srcObject = stream;
                // Capture loop
                setInterval(sendFrame, 1000);
            })
            .catch(function (error) {
                console.error("Camera access denied!", error);
            });
    }

    function sendFrame() {
        if (!socket.connected) return;

        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        if (canvas.width === 0) return;

        context.drawImage(video, 0, 0, canvas.width, canvas.height);
        const dataURL = canvas.toDataURL('image/jpeg', 0.6);
        socket.emit('frame_process', { image: dataURL });
    }

    socket.on('connect', () => {
        connectionStatus.innerHTML = '<span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span> Live Feed Connected';
    });

    socket.on('disconnect', () => {
        connectionStatus.innerHTML = '<span class="w-2 h-2 rounded-full bg-red-500"></span> Disconnected';
    });

    socket.on('attendance_update', (data) => {
        currentHeadCount = data.total_faces;
        markedStudentCount = data.marked_students.length;

        headCountElem.innerText = currentHeadCount;
        updateLists(data.current_students, data.marked_students);
    });

    socket.on('session_reset', (data) => {
        updateLists([], []);
        verificationResult.classList.add('hidden');
        commitBtn.disabled = true;
        commitBtn.classList.add('opacity-50', 'cursor-not-allowed');
    });

    socket.on('attendance_committed', (data) => {
        alert(data.message);
        window.location.reload(); // Refresh to clear everything
    });

    function updateLists(current, marked) {
        studentCountElem.innerText = marked.length;

        // 1. Update In-Frame Overlay (Badges on video)
        inFrameOverlay.innerHTML = current.map(s => `
            <div class="bg-green-600 bg-opacity-90 text-white text-xs font-bold px-3 py-1.5 rounded-full shadow-lg border border-green-400 backdrop-blur-sm animate-bounce">
                ${s.name} ⦿
            </div>
        `).join('') || '';

        // 2. Update Cumulative Marked List
        if (marked.length === 0) {
            markedList.innerHTML = `<div class="text-center text-gray-400 py-12 border-2 border-dashed border-gray-100 rounded-xl">Waiting for face scans...</div>`;
            return;
        }

        markedList.innerHTML = marked.map(s => `
            <div class="flex items-center p-3 bg-white hover:bg-indigo-50 rounded-xl border border-gray-100 shadow-sm transition-colors group">
                <div class="h-10 w-10 text-white flex items-center justify-center rounded-full text-lg font-bold bg-gradient-to-br from-indigo-500 to-purple-600 mr-3 shadow-md">
                    ${s.name.charAt(0)}
                </div>
                <div class="flex-grow">
                    <p class="font-bold text-gray-800">${s.name}</p>
                    <p class="text-[10px] uppercase tracking-wider text-green-600 font-bold">Verified Present</p>
                </div>
                <div class="text-green-500 bg-green-50 p-1 rounded-full opacity-0 group-hover:opacity-100 transition-opacity">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                </div>
            </div>
        `).join('');
    }

    function verifyHeadcount() {
        verificationResult.classList.remove('hidden', 'bg-red-100', 'text-red-800', 'bg-emerald-100', 'text-emerald-800');

        if (markedStudentCount === currentHeadCount && currentHeadCount > 0) {
            verificationResult.textContent = `PERFECT! Marked (${markedStudentCount}) matches Live Headcount.`;
            verificationResult.classList.add('bg-emerald-100', 'text-emerald-800');
        } else if (currentHeadCount === 0) {
            verificationResult.textContent = `No faces detected right now. Verification pending.`;
            verificationResult.classList.add('bg-yellow-100', 'text-yellow-800');
        } else {
            verificationResult.textContent = `MISMATCH! Recognized: ${markedStudentCount} | In Camera: ${currentHeadCount}`;
            verificationResult.classList.add('bg-red-100', 'text-red-800');
        }

        commitBtn.disabled = false;
        commitBtn.classList.remove('opacity-50', 'cursor-not-allowed');
    }

    function resetSession() {
        if (confirm('Clear the current attendance list? This will NOT save any records.')) {
            socket.emit('reset_session');
        }
    }

    function commitAttendance() {
        if (confirm(`Confirm final attendance for ${markedStudentCount} students?`)) {
            socket.emit('commit_attendance');
        }
    }
</script>
{% endblock %}
