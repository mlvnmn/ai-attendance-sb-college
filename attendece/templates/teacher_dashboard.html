{% extends "base.html" %}

{% block content %}
<div class="space-y-8">
    <!-- Header -->
    <div class="flex justify-between items-center">
        <h1 class="text-3xl font-bold text-gray-800">Teacher Dashboard</h1>
        <button onclick="document.getElementById('addStudentModal').classList.remove('hidden')"
            class="bg-primary hover:bg-indigo-700 text-white font-bold py-2 px-6 rounded-lg shadow transition">
            + Add New Student
        </button>
    </div>

    <!-- Student List -->
    <div class="bg-white rounded-xl shadow-lg overflow-hidden">
        <div class="px-6 py-4 border-b">
            <h2 class="text-lg font-semibold text-gray-700">Enrolled Students</h2>
        </div>
        <div class="overflow-x-auto">
            <table class="w-full text-left">
                <thead class="bg-gray-50 text-gray-600 uppercase text-xs">
                    <tr>
                        <th class="px-6 py-3">ID</th>
                        <th class="px-6 py-3">Name</th>
                        <th class="px-6 py-3">Email</th>
                        <th class="px-6 py-3">Parent Email</th>
                        <th class="px-6 py-3">Face Data</th>
                        <th class="px-6 py-3">Actions</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-gray-200" id="studentTableBody">
                    <!-- Loaded dynamically via API or Jinja loop if server-side rendered -->
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Add Student Modal -->
<div id="addStudentModal"
    class="hidden fixed inset-0 bg-gray-600 bg-opacity-50 overflow-y-auto h-full w-full flex items-center justify-center z-50">
    <div class="bg-white p-8 rounded-xl shadow-2xl w-full max-w-md mx-4">
        <h2 class="text-2xl font-bold mb-6 text-gray-800">Enroll Student</h2>
        <form id="addStudentForm" class="space-y-4">
            <div>
                <label class="block text-gray-700 text-sm font-bold mb-2">Full Name</label>
                <input type="text" name="name" required
                    class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-primary">
            </div>
            <div>
                <label class="block text-gray-700 text-sm font-bold mb-2">Student Email</label>
                <input type="email" name="email"
                    class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-primary">
            </div>
            <div>
                <label class="block text-gray-700 text-sm font-bold mb-2">Parent Email</label>
                <input type="email" name="parent_email"
                    class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-primary">
            </div>
            <div>
                <label class="block text-gray-700 text-sm font-bold mb-2">Photo (for Face ID)</label>
                <input type="file" name="photo" accept="image/*" required
                    class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100">
            </div>
            <div class="flex justify-end gap-3 mt-6">
                <button type="button" onclick="document.getElementById('addStudentModal').classList.add('hidden')"
                    class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg">Cancel</button>
                <button type="submit"
                    class="px-6 py-2 bg-primary text-white rounded-lg hover:bg-indigo-700 transition">Save</button>
            </div>
        </form>
    </div>
</div>

<script>
    // Fetch and display students
    async function loadStudents() {
        const response = await fetch('/api/students');
        const students = await response.json();
        const tbody = document.getElementById('studentTableBody');
        tbody.innerHTML = students.map(s => `
            <tr class="hover:bg-gray-50 transition">
                <td class="px-6 py-4">${s.id}</td>
                <td class="px-6 py-4 font-medium text-gray-900">${s.name}</td>
                <td class="px-6 py-4 text-gray-500">${s.email || '-'}</td>
                <td class="px-6 py-4 text-gray-500">${s.parent_email || '-'}</td>
                <td class="px-6 py-4">
                    ${s.has_encoding
                ? '<span class="px-2 py-1 bg-green-100 text-green-800 rounded-full text-xs font-semibold">Registered</span>'
                : '<span class="px-2 py-1 bg-red-100 text-red-800 rounded-full text-xs font-semibold">Missing</span>'}
                </td>
                <td class="px-6 py-4">
                    <button onclick="deleteStudent(${s.id})" class="text-red-500 hover:text-red-700 text-sm font-semibold">Delete</button>
                </td>
            </tr>
        `).join('');
    }

    document.getElementById('addStudentForm').onsubmit = async (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);

        try {
            const res = await fetch('/api/students', {
                method: 'POST',
                body: formData
            });
            if (res.ok) {
                alert('Student added successfully!');
                document.getElementById('addStudentModal').classList.add('hidden');
                e.target.reset();
                loadStudents();
            } else {
                alert('Error adding student');
            }
        } catch (err) {
            console.error(err);
            alert('Error connecting to server');
        }
    };

    async function deleteStudent(id) {
        if (confirm('Are you sure?')) {
            await fetch(`/api/students/${id}`, { method: 'DELETE' });
            loadStudents();
        }
    }

    loadStudents();
</script>
{% endblock %}
